<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ منصات تواصل الرقمية ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glass-container">
    <div class="header">
      <h1></h1> ✨ المنصات التي استخدمها حاليا ✨</h1>
      <p> 🍀تواصل معي عبر حساباتي أو أرسال رسالة مجهولة</p>
    </div>

    <div class="links-grid">
      <a href="https://www.facebook.com/profile.php?id=61550556513284" class="platform-card fb-card" target="_blank">
        <i class="fab fa-facebook-f"></i> Facebook
      </a>
      <a href="https://instagram.com/e.qn2" class="platform-card insta-card" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
      </a>
      <a href="https://t.me/ct_5t" class="platform-card tele-card" target="_blank">
        <i class="fab fa-telegram-plane"></i> Telegram
      </a>
      <a href="https://tiktok.com/massoud2_dz" class="platform-card tiktok-card" target="_blank">
        <i class="fab fa-tiktok"></i> TikTok
      </a>
    </div>

    <div class="msg-box">
      <h3>📩  أرسل رسالة مجهولة لي </h3>
      <textarea id="msg" placeholder="اكتب رسالتك هنا...✍️"></textarea>
      <button id="sendBtn"><i class="fas fa-paper-plane"></i> إرسال</button>
      <div id="alertBox" class="alert-box"></div>
    </div>
  </div>

  <script>
    // إعدادات البوت
    const BOT_TOKEN = '8439360590:AAFgk6t5BtJNiQPaBYI3x_Ssn0iPWyo8nnI';
    const CHAT_ID = '6649939033';

    const sendBtn = document.getElementById('sendBtn');
    const msgInput = document.getElementById('msg');
    const alertBox = document.getElementById('alertBox');

    let isSending = false;

    function showAlert(message, type, isPermanent = false) {
      alertBox.textContent = message;
      alertBox.className = `alert-box alert-${type}`;
      alertBox.style.display = 'block';
      if (!isPermanent) {
        setTimeout(() => {
          if (alertBox.style.display === 'block') alertBox.style.display = 'none';
        }, 6000);
      }
    }

    async function testBotConnection() {
      try {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/getMe`;
        const response = await fetch(url);
        const data = await response.json();
        if (data.ok) {
          console.log('✅ البوت يعمل:', data.result.username);
          const testUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
          const testPayload = {
            chat_id: CHAT_ID,
          };
          const testResponse = await fetch(testUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(testPayload)
          });
          const testData = await testResponse.json();
          if (testData.ok) {
            console.log('✅ رسالة الاختبار وصلت إلى التلغرام');
          } else {
            console.error('❌ فشل إرسال رسالة الاختبار:', testData);
            showAlert(`مرحبا بك في صفحة معلومات تواصلي  رجاء احترام وعدم شتم 🙂.', 'error', true);
          }
        } else {
          console.error('❌ التوكن غير صالح:', data);
          showAlert('❌ التوكن غير صحيح! راجع التوكن.', 'error', true);
        }
      } catch (error) {
        console.error('خطأ في الاتصال بالبوت:', error);
        showAlert('⚠️ لا يمكن الاتصال بخادم التلغرام. تحقق من اتصالك بالإنترنت.', 'error', true);
      }
    }

    testBotConnection();

    sendBtn.addEventListener('click', async () => {
      const message = msgInput.value.trim();
      if (!message) {
        showAlert('✏️ الرجاء كتابة رسالة أولاً', 'error');
        return;
      }
      if (isSending) return;
      isSending = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الإرسال...';

      const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
      const payload = {
        chat_id: CHAT_ID,
        text: `📩 وصلتك رسالة :\n\n${message}`,
        parse_mode: 'HTML'
      };

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (data.ok) {
          showAlert('✅ تم إرسال رسالتك بنجاح! شكراً لك', 'success');
          msgInput.value = '';
        } else {
          console.error('خطأ من التلغرام:', data);
          let errorMsg = '❌ فشل الإرسال: ';
          if (data.description.includes('chat not found')) {
            errorMsg += 'لم يتم العثور على المحادثة. تأكد من أنك أرسلت رسالة للبوت أولاً.';
          } else if (data.description.includes('Forbidden')) {
            errorMsg += 'البوت ليس لديه صلاحية الإرسال. ابدأ المحادثة مع البوت.';
          } else {
            errorMsg += data.description;
          }
          showAlert(errorMsg, 'error');
        }
      } catch (error) {
        console.error('خطأ في الشبكة:', error);
        showAlert('⚠️ خطأ في الاتصال بالإنترنت أو الخادم، حاول مرة أخرى', 'error');
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال';
      }
    });
  </script>
</body>
</html>
