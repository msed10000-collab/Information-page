<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصاتي الرقمية</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-globe"></i> منصاتي الرقمية</h1>
    <p>تواصل معي عبر حساباتي أو أرسل رسالة مجهولة</p>

    <div class="links">
      <a href="https://facebook.com" class="social facebook"><i class="fab fa-facebook-f"></i> Facebook</a>
      <a href="https://instagram.com" class="social instagram"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://t.me" class="social telegram"><i class="fab fa-telegram"></i> Telegram</a>
      <a href="https://tiktok.com" class="social tiktok"><i class="fab fa-tiktok"></i> TikTok</a>
      <a href="https://wa.me/123456789" class="social whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    </div>

    <div class="message-box">
      <h3><i class="fas fa-paper-plane"></i> أرسل رسالة مجهولة</h3>
      <textarea id="msg" maxlength="300" placeholder="اكتب رسالتك هنا..."></textarea>
      <div class="counter"><span id="count">0</span>/300</div>
      <button id="sendBtn"><i class="fas fa-paper-plane"></i> إرسال</button>
      <div id="alert"></div>
    </div>
  </div>

  <script>
    // === إعدادات بوت تلغرام ===
    const BOT_TOKEN = "YOUR_BOT_TOKEN";   // ضع التوكن هنا
    const CHAT_ID   = "YOUR_CHAT_ID";     // ضع معرف الدردشة هنا

    const msgInput = document.getElementById('msg');
    const countSpan = document.getElementById('count');
    const sendBtn = document.getElementById('sendBtn');
    const alertDiv = document.getElementById('alert');

    msgInput.addEventListener('input', () => {
      countSpan.textContent = msgInput.value.length;
    });

    function showAlert(text, type) {
      alertDiv.textContent = text;
      alertDiv.className = `alert ${type}`;
      alertDiv.style.display = 'block';
      setTimeout(() => {
        alertDiv.style.display = 'none';
      }, 4000);
    }

    async function sendToTelegram(message) {
      const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: `📩 رسالة جديدة:\n${message}` })
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.description);
    }

    sendBtn.addEventListener('click', async () => {
      const msg = msgInput.value.trim();
      if (!msg) return showAlert('اكتب رسالة أولاً', 'error');
      if (BOT_TOKEN === 'YOUR_BOT_TOKEN') return showAlert('لم يتم إعداد البوت بعد', 'error');

      sendBtn.disabled = true;
      sendBtn.innerHTML = 'جاري الإرسال...';
      try {
        await sendToTelegram(msg);
        showAlert('تم الإرسال بنجاح ✅', 'success');
        msgInput.value = '';
        countSpan.textContent = '0';
      } catch (err) {
        showAlert('فشل الإرسال ❌', 'error');
      } finally {
        sendBtn.disabled = false;
        sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال';
      }
    });
  </script>
</body>
</html>
