<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>واجهة إدارة البوتات</title>
<style>
body { font-family: Arial; background: #f2f2f2; padding: 50px; text-align: center; }
input, button { padding: 8px; margin: 5px; border-radius: 5px; }
.bot-card { background: #fff; display: inline-block; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: left; }
h2 { margin-bottom: 10px; }
</style>
</head>
<body>

<h1>إدارة عدة بوتات تليجرام</h1>

<div id="botsContainer"></div>

<button onclick="addBot()">➕ إضافة بوت جديد</button>

<script>
let bots = [
    {name: "بوت التجربة", token: "", chatId: "", message: "مرحبًا من بوت التجربة"},
    {name: "بوت استضافة ملفات", token: "", chatId: "", message: "هنا رابط الملف: https://example.com/file.zip"}
];

function renderBots() {
    const container = document.getElementById("botsContainer");
    container.innerHTML = "";
    bots.forEach((bot, index) => {
        const botDiv = document.createElement("div");
        botDiv.className = "bot-card";
        botDiv.innerHTML = `
            <h2>${bot.name}</h2>
            <input type="text" placeholder="توكن البوت" value="${bot.token}" id="token${index}"><br>
            <input type="text" placeholder="Chat ID" value="${bot.chatId}" id="chatId${index}"><br>
            <input type="text" placeholder="الرسالة" value="${bot.message}" id="msg${index}"><br>
            <button onclick="sendMessage(${index})">إرسال رسالة</button>
            <div id="status${index}" style="margin-top:5px;"></div>
        `;
        container.appendChild(botDiv);
    });
}

function addBot() {
    bots.push({name: "بوت جديد", token: "", chatId: "", message: ""});
    renderBots();
}

function sendMessage(index) {
    const token = document.getElementById("token"+index).value;
    const chatId = document.getElementById("chatId"+index).value;
    const text = document.getElementById("msg"+index).value;

    if(!token || !chatId || !text){
        alert("يرجى ملء جميع الحقول!");
        return;
    }

    fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: chatId, text: text })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("status"+index).innerHTML = `✅ تم الإرسال: ${JSON.stringify(data)}`;
    })
    .catch(err => {
        document.getElementById("status"+index).innerHTML = `❌ حدث خطأ (CORS أو توكن خاطئ)`;
    });
}

// أول مرة تعرض البوتات
renderBots();
</script>

</body>
</html>
