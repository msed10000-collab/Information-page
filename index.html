<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تواصل معي •|• روابطي الشخصية (+) رسائل مجهولة</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- CSS الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="hero">
        <h1><i class="fas fa-paper-plane" style="margin-left: 10px;"></i> تواصل معي بكل أريحية</h1>
        <p> منصاتي الاجتماعية °|° راسلني بسرية </p>
    </div>

    <!-- روابط منصات التواصل الاجتماعي (تم تحديثها حسب طلبك) -->
    <div class="social-grid">
        <a href="https://www.instagram.com/e.qn2?igsh=cGVjeHVudDc5cDIz" class="social-card instagram" target="_blank">
            <i class="fab fa-instagram"></i>
            <span>إنستغرام</span>
        </a>
        <a href="https://www.tiktok.com/@massoud2_dz" class="social-card tiktok" target="_blank">
            <i class="fab fa-tiktok"></i>
            <span>تيك توك</span>
        </a>
        <a href="https://www.facebook.com/profile.php?id=61550556513284" class="social-card facebook" target="_blank">
            <i class="fab fa-facebook-f"></i>
            <span>فيسبوك</span>
        </a>
        <a href="https://t.me/ct_5t" class="social-card telegram" target="_blank">
            <i class="fab fa-telegram-plane"></i>
            <span>تيليجرام</span>
        </a>
    </div>

    <!-- قسم الرسالة المجهولة إلى بوت تلغرام -->
    <div class="message-section">
        <div class="glass-card message-card">
            <div class="message-icon">
                <i class="fas fa-user-secret"></i>
            </div>
            <h3>رسالة مجهولة المصدر</h3>
            <p>أرسل رسالة تصلني مباشرة عبر <strong>بوت تلغرام</strong> بدون كشف هويتك. كل ما تكتبه يبقى سرياً.</p>
            
            <form id="anonymousForm">
                <div class="input-group">
                    <textarea id="anonymousMessage" rows="4" placeholder="اكتب رسالتك هنا... (سيتم إرسالها لبوت التلغرام الخاص بي)"></textarea>
                </div>
                <button type="submit" id="sendBtn">
                    <i class="fab fa-telegram"></i> إرسال الرسالة مجهولة
                </button>
                <div id="statusMsg" class="status-message"></div>
                <div class="info-note">
                    <i class="fas fa-shield-alt"></i> مجهول بالكامل • لن يُطلب منك أي بيانات شخصية
                </div>
            </form>
        </div>
    </div>
    <footer>
        <i class="fas fa-lock"></i> خاصية إرسال رسالة بدون معرفة هويتك 👤
    </footer>
</div>

<script>
    // ========== إعدادات بوت التلغرام (تم تعبئتها بناءً على بياناتك) ==========
    const BOT_TOKEN = '8439360590:AAFgk6t5BtJNiQPaBYI3x_Ssn0iPWyo8nnI';
    const CHAT_ID = '6649939033';

    // عناصر DOM
    const form = document.getElementById('anonymousForm');
    const messageInput = document.getElementById('anonymousMessage');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('statusMsg');

    // دالة مساعدة لعرض حالة الإرسال
    function showStatus(message, isError = false) {
        statusDiv.style.display = 'block';
        statusDiv.textContent = message;
        if (isError) {
            statusDiv.className = 'status-message status-error';
        } else {
            statusDiv.className = 'status-message status-success';
        }
        setTimeout(() => {
            if (statusDiv.style.display === 'block') {
                statusDiv.style.opacity = '0';
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                    statusDiv.style.opacity = '1';
                }, 300);
            }
        }, 5000);
    }

    // دالة إرسال الرسالة إلى بوت التلغرام عبر API
    async function sendToTelegram(messageText) {
        if (!messageText || messageText.trim() === '') {
            showStatus('✏️ الرجاء كتابة رسالة قبل الإرسال.', true);
            return false;
        }

        const now = new Date();
        const formattedTime = `${now.toLocaleDateString('ar-EG')} - ${now.toLocaleTimeString('ar-EG')}`;
        const finalMessage = `🕊️ رسالة مجهولة المصدر:\n\n📝 ${messageText.trim()}\n\n⏱️ الزمن: ${formattedTime}\n🔒 هوية المرسل: غير معروفة`;

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

        try {
            const originalBtnText = sendBtn.innerHTML;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الإرسال...';
            sendBtn.disabled = true;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: finalMessage,
                    parse_mode: 'HTML',
                    disable_web_page_preview: true
                })
            });

            const data = await response.json();

            if (response.ok && data.ok) {
                showStatus('✅ تم إرسال رسالتك المجهولة بنجاح .', false);
                messageInput.value = '';
                return true;
            } else {
                console.error('Telegram API error:', data);
                let errorMsg = '❌ فشل الإرسال: ';
                if (data.description) errorMsg += data.description;
                else errorMsg += 'تأكد من التوكن و chat_id أو اتصالك بالإنترنت.';
                showStatus(errorMsg, true);
                return false;
            }
        } catch (error) {
            console.error('Network error:', error);
            showStatus('❌ خطأ في الشبكة أو تعذر الوصول إلى خوادم تلغرام.', true);
            return false;
        } finally {
            sendBtn.innerHTML = '<i class="fab fa-telegram"></i> إرسال الرسالة مجهولة';
            sendBtn.disabled = false;
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await sendToTelegram(messageInput.value);
    });

    // تأكيد أن التوكن والـ ID قد تم تعبئتهما
    console.log('✅ بوت تلغرام جاهز للإرسال');
</script>
</body>
</html>
